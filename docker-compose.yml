version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: crossword_db
    restart: always
    environment:
      MYSQL_DATABASE: crossword
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./crossword_db.sql:/docker-entrypoint-initdb.d/init.sql

  server:
    build: ./server
    container_name: crossword_backend
    restart: always
    ports:
      - "3000:3000"
    command: npm run dev
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=
      - DB_NAME=crossword
      - PORT=3000
      - ORIGIN=http://localhost:5173
      - JWT_SECRET=JGI7qtfGVZfp8pUp8ND9G0zGP0Gz7F5uNZySa7sn6oB
      - JWT_EXPIRED=3d
    depends_on:
      - db

  client:
    build: ./client
    container_name: crossword_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3000/api
    depends_on:
      - server

volumes:
  db_data:
